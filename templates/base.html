<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="أدعية وأذكار إسلامية موثقة بالمراجع — واجهة مريحة للعين مع عداد وتسابيح ومسبحة إلكترونية.">
  <meta name="theme-color" content="#0d7377">
  <title>{% block title %}أدعية إسلامية{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Rawnaq Design System v4 -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- ═══ Navbar ═══ -->
  <nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('home') }}">
        <span class="navbar-brand__icon"><i class="bi bi-moon-stars"></i></span>
        <span class="navbar-brand__text">أدعية إسلامية</span>
      </a>

      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false" aria-label="القائمة">
        <i class="bi bi-list navbar-toggler__icon"></i>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mt-2 mt-lg-0">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}"
               href="{{ url_for('home') }}">
              <i class="bi bi-house-door"></i> الرئيسية
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'tasbeeh' %}active{% endif %}"
               href="{{ url_for('tasbeeh') }}">
              <i class="bi bi-circle"></i> المسبحة
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'prayer_times' %}active{% endif %}"
               href="{{ url_for('prayer_times') }}">
              <i class="bi bi-clock"></i> مواقيت الصلاة
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'qibla' %}active{% endif %}"
               href="{{ url_for('qibla') }}">
              <i class="bi bi-compass"></i> القِبلة
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ═══ Main ═══ -->
  <main class="py-4">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- ═══ Footer ═══ -->
  <footer class="app-footer">
    <div class="container">
      <div class="footer-inner">
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
